<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GHOST RELAY // SHADOW BEACON - AUTO MODE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300;400;500;700&display=swap');

        :root {
            --bg-base: #050608;
            --panel-bg: rgba(10, 14, 20, 0.6);
            --border-dim: #1e293b;
            --border-highlight: #334155;
            --text-main: #64748b;
            --text-dim: #334155;
            --text-bright: #94a3b8;
            --accent-stealth: #0f766e; /* Dark teal */
            --accent-ping: #38bdf8; /* Soft blue */
            --accent-warn: #9a3412; /* Muted orange/rust */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            font-family: 'Roboto Mono', monospace;
            font-size: 12px;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            padding: 1.5rem;
            position: relative;
        }

        /* --- Effets Cinématiques (CRT, Scanlines, Vignette) --- */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
            background-size: 100% 4px;
            z-index: 100;
            pointer-events: none;
        }

        /* Ligne de balayage holographique lente */
        .scanline {
            width: 100%;
            height: 10px;
            background: linear-gradient(to bottom, transparent, rgba(15, 118, 110, 0.2), transparent);
            position: absolute;
            top: -10px;
            left: 0;
            z-index: 101;
            opacity: 0.5;
            pointer-events: none;
            animation: scan 8s linear infinite;
        }

        @keyframes scan {
            0% { top: -10px; }
            100% { top: 100%; }
        }

        /* Vignette d'assombrissement sur les bords */
        .vignette {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle, transparent 50%, rgba(0,0,0,0.6) 100%);
            z-index: 99;
            pointer-events: none;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            border-bottom: 1px solid var(--border-highlight);
            padding-bottom: 10px;
            margin-bottom: 20px;
            z-index: 10;
        }

        .title-block h1 {
            font-size: 16px;
            font-weight: 500;
            color: var(--text-bright);
            letter-spacing: 2px;
            text-shadow: 0 0 5px rgba(148, 163, 184, 0.3);
        }

        .title-block .subtitle {
            font-size: 10px;
            color: var(--accent-stealth);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 4px;
            animation: pulse-text 3s infinite alternate;
        }

        .global-status {
            text-align: right;
            font-size: 11px;
        }

        .status-indicator {
            display: inline-block;
            width: 6px;
            height: 6px;
            background-color: var(--accent-stealth);
            border-radius: 50%;
            margin-right: 6px;
            animation: blink-fast 1.5s infinite;
        }

        /* --- Grille Principale --- */
        .main-grid {
            display: grid;
            grid-template-columns: 260px 1fr 260px;
            grid-template-rows: 1fr 220px;
            gap: 15px;
            height: 100%;
            z-index: 10;
        }

        .panel {
            background: var(--panel-bg);
            border: 1px solid var(--border-dim);
            padding: 15px;
            position: relative;
            display: flex;
            flex-direction: column;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }

        /* Coins techniques */
        .panel::before, .panel::after {
            content: '';
            position: absolute;
            width: 8px; height: 8px;
            border-color: var(--text-dim);
            border-style: solid;
        }
        .panel::before { top: 0; left: 0; border-width: 1px 0 0 1px; }
        .panel::after { bottom: 0; right: 0; border-width: 0 1px 1px 0; }

        .panel-title {
            font-size: 10px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
            border-bottom: 1px dashed var(--border-dim);
            padding-bottom: 5px;
        }

        /* --- Télémétrie (Gauche) --- */
        .data-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 11px;
        }

        .data-label { color: var(--text-main); }
        .data-value { color: var(--text-bright); font-weight: 500; font-variant-numeric: tabular-nums; }

        .progress-bar {
            width: 100%;
            height: 2px;
            background: var(--border-dim);
            margin-top: 4px;
            position: relative;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent-stealth);
            width: 30%;
            transition: width 0.5s ease;
        }

        .traffic-graph {
            display: flex;
            align-items: flex-end;
            height: 40px;
            gap: 2px;
            margin-bottom: 15px;
        }

        .bar {
            flex: 1;
            background-color: var(--border-highlight);
            transition: height 0.1s linear;
        }

        /* --- Visualiseur Central --- */
        .visualizer-panel {
            grid-column: 2 / 3;
            grid-row: 1 / 2;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background: radial-gradient(circle, rgba(15,118,110,0.05) 0%, transparent 60%);
        }

        #radar-canvas {
            width: 100%;
            height: 100%;
            max-width: 500px;
            max-height: 500px;
            opacity: 0.8;
            filter: drop-shadow(0 0 4px rgba(15,118,110,0.3));
        }

        /* --- Panneau Matrice (Droite - Remplace les boutons) --- */
        .matrix-panel {
            grid-column: 3 / 4;
            grid-row: 1 / 3;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        
        .matrix-stream {
            flex: 1;
            font-size: 10px;
            line-height: 1.4;
            color: var(--text-dim);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            font-variant-numeric: tabular-nums;
        }

        /* --- Panneau de Logs (Bas Gauche & Centre) --- */
        .logs-panel {
            grid-column: 1 / 3;
            grid-row: 2 / 3;
            overflow: hidden;
        }

        .log-container {
            height: 100%;
            overflow-y: hidden;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        .log-line {
            margin-bottom: 4px;
            opacity: 0.9;
        }

        .log-line .timestamp { color: var(--text-dim); margin-right: 10px; }
        .log-line .sys { color: var(--accent-stealth); margin-right: 10px; }

        /* Effet machine à écrire pour les logs */
        .typewriter {
            display: inline-block;
            overflow: hidden;
            white-space: nowrap;
            border-right: 2px solid var(--accent-stealth);
            animation: typing 0.5s steps(30, end) forwards, blink-caret 0.5s step-end infinite;
        }

        @keyframes typing {
            from { max-width: 0 }
            to { max-width: 100% }
        }
        @keyframes blink-caret {
            from, to { border-color: transparent }
            50% { border-color: var(--accent-stealth); }
        }

        /* --- Animations CSS génériques --- */
        @keyframes pulse-text {
            from { opacity: 0.5; }
            to { opacity: 1; }
        }

        @keyframes blink-fast {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 1; box-shadow: 0 0 5px var(--accent-stealth); }
        }
    </style>
</head>
<body>

    <div class="vignette"></div>
    <div class="scanline"></div>

    <header>
        <div class="title-block">
            <h1>GHOST RELAY // SHADOW BEACON</h1>
            <div class="subtitle">Passive Mode // Node 77-Alpha</div>
        </div>
        <div class="global-status">
            <div id="status-text" style="color: var(--text-bright);">UPLINK MAINTAINED</div>
            <div style="margin-top: 5px; color: var(--text-dim);">
                <span class="status-indicator" id="main-indicator"></span>
                SILENT FREQUENCY HOPPING
            </div>
        </div>
    </header>

    <div class="main-grid">
        
        <div class="panel telemetry">
            <div class="panel-title">Beacon Telemetry</div>
            
            <div class="data-row">
                <span class="data-label">PWR DRAW</span>
                <span class="data-value" id="pwr-val">0.82W</span>
            </div>
            <div class="progress-bar"><div class="progress-fill" id="pwr-bar" style="width: 12%;"></div></div>
            <br>
            
            <div class="data-row">
                <span class="data-label">STEALTH INDEX</span>
                <span class="data-value" id="stealth-val">99.1%</span>
            </div>
            <div class="progress-bar"><div class="progress-fill" id="stealth-bar" style="width: 99%; background: var(--text-dim);"></div></div>
            <br>
            
            <div class="data-row">
                <span class="data-label">TX TRAFFIC</span>
                <span class="data-value" id="tx-val">2.1 kbps</span>
            </div>
            <div class="traffic-graph" id="tx-graph"></div>
            
            <div class="data-row">
                <span class="data-label">RX TRAFFIC</span>
                <span class="data-value" id="rx-val">0.4 kbps</span>
            </div>
            <div class="traffic-graph" id="rx-graph"></div>
        </div>

        <div class="panel visualizer-panel">
            <canvas id="radar-canvas"></canvas>
        </div>

        <div class="panel matrix-panel">
            <div class="panel-title">Encryption Matrix</div>
            <div class="data-row" style="border-bottom: 1px solid var(--border-dim); padding-bottom: 5px; margin-bottom: 10px;">
                <span class="data-label">CURRENT KEY</span>
                <span class="data-value" id="current-key">RSA-4096-S</span>
            </div>
            <div class="matrix-stream" id="matrix-stream">
                </div>
        </div>

        <div class="panel logs-panel">
            <div class="panel-title">System Event Logs</div>
            <div class="log-container" id="log-container">
                </div>
        </div>

    </div>

    <script>
        // --- Utilitaires ---
        function getTimestamp() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            const ms = String(now.getMilliseconds()).padStart(3, '0');
            return `${h}:${m}:${s}.${ms}`;
        }

        // --- Système de Logs (Typing Effect) ---
        const logContainer = document.getElementById('log-container');
        const defaultLogs = [
            "MONITORING BANDWIDTH 144.3 MHz...",
            "ROTATING ENCRYPTION HASH",
            "SIGNAL ECHO DISCARDED - BACKGROUND NOISE",
            "MAINTAINING SILENT LINK TO MAIN MODULE",
            "SUPPRESSING RF LEAKAGE",
            "PASSIVE SCAN COMPLETE: ZERO THREATS DETECTED",
            "HOPPING TO BACKUP FREQUENCY",
            "UPLINK INTEGRITY AT 99.8%"
        ];

        function addLog(message, isAlert = false) {
            const line = document.createElement('div');
            line.className = 'log-line';
            const color = isAlert ? 'var(--accent-warn)' : 'var(--text-bright)';
            
            line.innerHTML = `<span class="timestamp">[${getTimestamp()}]</span> <span class="sys">SYS></span> <span style="color: ${color}" class="typewriter">${message}</span>`;
            logContainer.appendChild(line);
            
            // Supprime l'effet typewriter après l'animation pour nettoyer le DOM
            setTimeout(() => {
                const tw = line.querySelector('.typewriter');
                if(tw) {
                    tw.style.borderRight = 'none';
                    tw.style.animation = 'none';
                }
            }, 600);
            
            if (logContainer.children.length > 7) {
                logContainer.removeChild(logContainer.firstChild);
            }
        }

        // Initialisation des logs
        addLog("SYSTEM BOOT... SILENT PROTOCOL ENGAGED");
        setTimeout(() => addLog("AWAITING PASSIVE DATA..."), 1000);

        // --- Générateur de flux matriciel (Hexadécimal) ---
        const matrixStream = document.getElementById('matrix-stream');
        
        function generateHexLine() {
            let line = '';
            for(let i=0; i<6; i++) {
                line += Math.floor(Math.random()*16777215).toString(16).padStart(6, '0').toUpperCase() + ' ';
            }
            return line;
        }

        setInterval(() => {
            const div = document.createElement('div');
            div.innerText = `0x${Math.floor(Math.random()*99).toString().padStart(2,'0')} : ` + generateHexLine();
            
            // Surlignage aléatoire pour faire technique
            if(Math.random() > 0.9) {
                div.style.color = 'var(--text-bright)';
            }
            
            matrixStream.appendChild(div);
            if(matrixStream.children.length > 15) {
                matrixStream.removeChild(matrixStream.firstChild);
            }
        }, 150); // Vitesse de défilement

        // --- Graphes de Trafic ---
        function setupGraph(id) {
            const container = document.getElementById(id);
            for(let i=0; i<35; i++) {
                const bar = document.createElement('div');
                bar.className = 'bar';
                container.appendChild(bar);
            }
        }

        function updateGraph(id, isTx, multiplier = 1) {
            const container = document.getElementById(id);
            const bars = container.children;
            for(let i=0; i<bars.length - 1; i++) {
                bars[i].style.height = bars[i+1].style.height;
                bars[i].style.backgroundColor = bars[i+1].style.backgroundColor;
            }
            
            let baseHeight = isTx ? (Math.random() * 8 + 1) : (Math.random() * 4 + 1);
            let finalHeight = baseHeight * multiplier;
            
            bars[bars.length - 1].style.height = `${finalHeight}px`;
            
            // Changement de couleur si pic de trafic
            if(finalHeight > 25) {
                bars[bars.length - 1].style.backgroundColor = 'var(--accent-ping)';
            } else {
                bars[bars.length - 1].style.backgroundColor = 'var(--border-highlight)';
            }
        }

        setupGraph('tx-graph');
        setupGraph('rx-graph');

        // --- Animations du Canvas (Radar/Ondes passives) ---
        const canvas = document.getElementById('radar-canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let globalAngle = 0;
        let pings = [];

        function resizeCanvas() {
            const rect = canvas.parentElement.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;
            width = canvas.width;
            height = canvas.height;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function drawVisualizer() {
            ctx.clearRect(0, 0, width, height);
            const cx = width / 2;
            const cy = height / 2;
            const maxRadius = Math.min(cx, cy) - 20;

            globalAngle += 0.01;

            // Grille polaire de fond
            ctx.strokeStyle = 'rgba(30, 41, 59, 0.3)';
            ctx.lineWidth = 1;
            for(let i=1; i<=4; i++) {
                ctx.beginPath();
                ctx.arc(cx, cy, (maxRadius / 4) * i, 0, Math.PI * 2);
                ctx.stroke();
            }

            // Croix de visée
            ctx.beginPath();
            ctx.moveTo(cx, cy - maxRadius - 10); ctx.lineTo(cx, cy + maxRadius + 10);
            ctx.moveTo(cx - maxRadius - 10, cy); ctx.lineTo(cx + maxRadius + 10, cy);
            ctx.stroke();

            // Anneau rotatif en pointillé
            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(globalAngle);
            ctx.beginPath();
            ctx.setLineDash([15, 10, 5, 10]);
            ctx.arc(0, 0, maxRadius * 0.75, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(15, 118, 110, 0.6)';
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.restore();

            // Ligne de scan radar interne
            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(globalAngle * 3);
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.lineTo(0, -maxRadius);
            ctx.strokeStyle = 'rgba(15, 118, 110, 0.8)';
            ctx.stroke();
            
            // Traînée du radar
            ctx.beginPath();
            ctx.moveTo(0,0);
            ctx.arc(0, 0, maxRadius, -Math.PI/2, -Math.PI/2 + 0.3, false);
            ctx.lineTo(0,0);
            ctx.fillStyle = 'rgba(15, 118, 110, 0.1)';
            ctx.fill();
            ctx.restore();

            // Pings fantômes (Données détectées)
            for (let i = pings.length - 1; i >= 0; i--) {
                let p = pings[i];
                ctx.beginPath();
                ctx.arc(cx + p.x, cy + p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(56, 189, 248, ${p.alpha})`; // Accent ping
                ctx.fill();
                
                // Onde autour du ping
                ctx.beginPath();
                ctx.arc(cx + p.x, cy + p.y, p.size + (1 - p.alpha)*20, 0, Math.PI * 2);
                ctx.strokeStyle = `rgba(56, 189, 248, ${p.alpha * 0.5})`;
                ctx.stroke();

                p.alpha -= 0.01;
                if (p.alpha <= 0) pings.splice(i, 1);
            }

            requestAnimationFrame(drawVisualizer);
        }
        drawVisualizer();

        // --- Moteur d'Événements Aléatoires Automatisés ---
        // Simule la vie de l'appareil sans interaction humaine

        let currentMultiplier = 1;

        setInterval(() => {
            // Mise à jour continue de la télémétrie de base
            updateGraph('tx-graph', true, currentMultiplier);
            updateGraph('rx-graph', false, currentMultiplier);
            
            document.getElementById('tx-val').innerText = ((Math.random() * 2 + 1) * currentMultiplier).toFixed(1) + ' kbps';
            document.getElementById('rx-val').innerText = ((Math.random() * 0.5 + 0.1) * currentMultiplier).toFixed(1) + ' kbps';

            const pwr = 0.8 + (Math.random() * 0.2 * currentMultiplier);
            document.getElementById('pwr-val').innerText = pwr.toFixed(2) + 'W';
            document.getElementById('pwr-bar').style.width = (pwr / 5 * 100) + '%';
            
            const stealth = 99.5 - (currentMultiplier > 1 ? Math.random() * 5 : Math.random() * 0.5);
            document.getElementById('stealth-val').innerText = stealth.toFixed(1) + '%';
            document.getElementById('stealth-bar').style.width = stealth + '%';

            // Logs passifs réguliers
            if (Math.random() > 0.85) {
                addLog(defaultLogs[Math.floor(Math.random() * defaultLogs.length)]);
            }

        }, 1000);

        // Événements majeurs aléatoires (Pics de réseau, Pings, etc.)
        setInterval(() => {
            const eventChance = Math.random();
            
            if (eventChance > 0.8) {
                // Événement 1 : Détection d'un écho distant
                addLog("GHOST ECHO DETECTED ON FREQ 144.3", true);
                
                // Ajouter des points sur le radar
                const maxR = Math.min(width, height) / 2 - 30;
                for(let i=0; i<3; i++) {
                    const r = Math.random() * maxR;
                    const theta = Math.random() * Math.PI * 2;
                    pings.push({
                        x: Math.cos(theta) * r,
                        y: Math.sin(theta) * r,
                        size: Math.random() * 3 + 2,
                        alpha: 1
                    });
                }
            } 
            else if (eventChance < 0.2) {
                // Événement 2 : Pic de transmission de données
                addLog("TRANSMITTING COMPRESSED DATA BURST...");
                currentMultiplier = 4; // Augmente drastiquement les graphes
                document.getElementById('status-text').innerText = "DATA BURST ACTIVE";
                document.getElementById('status-text').style.color = "var(--accent-ping)";
                
                setTimeout(() => {
                    currentMultiplier = 1;
                    document.getElementById('status-text').innerText = "UPLINK MAINTAINED";
                    document.getElementById('status-text').style.color = "var(--text-bright)";
                    addLog("BURST COMPLETE. RESUMING SILENT IDLE.");
                }, 3000);
            }
        }, 6000); // Teste un événement toutes les 6 secondes

    </script>
</body>
</html>
